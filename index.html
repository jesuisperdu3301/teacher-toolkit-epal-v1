<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teacher Toolkit ΕΠΑΛ</title>
  <meta name="description" content="Offline εκπαιδευτικό toolkit για ΕΠΑΛ: Impostor, Flashcards, Quiz, Random Wheel και βάσεις όρων.">
  <meta name="theme-color" content="#6d5dfc">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="logo"><div class="logoIcon">🎓</div><div><h1>Teacher Toolkit<br>ΕΠΑΛ</h1><p>Offline classroom app</p></div></div>
      <nav class="nav" id="nav"></nav>
      <div class="card mini-card">
        <div class="small">Auto-save</div>
        <div class="row between"><strong id="saveState">Ενεργό</strong><span>💾</span></div>
        <p class="small">Οι βάσεις και οι ρυθμίσεις αποθηκεύονται τοπικά στο browser αυτής της συσκευής.</p>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="title"><h2 id="pageTitle"></h2><p id="pageSubtitle"></p></div>
        <div class="chips"><span class="chip" id="statsChip"></span><span class="chip" id="subjectChip"></span></div>
      </div>
      <section id="view"></section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <input type="file" id="importFile" class="hidden" accept=".json,.epack,application/json">
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
